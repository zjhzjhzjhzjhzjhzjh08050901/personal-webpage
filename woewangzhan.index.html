<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #222;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section h2 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #333;
            border-left: 4px solid #4e8af9;
            padding-left: 10px;
        }

        .section p {
            color: #555;
            line-height: 1.7;
        }

        .skills span {
            display: inline-block;
            background: #eef4ff;
            color: #4e8af9;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 0 8px 8px 0;
            font-size: 14px;
        }

        .contact a {
            color: #4e8af9;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>我的个人主页</h1>
        <p class="subtitle">正在自学编程，慢慢变强中</p >

        <div class="section">
            <h2>关于我</h2>
            <p>
                热爱技术，正在学习 Python、C++、Web 开发，
                希望以后能做出自己的项目，成为一名厉害的开发者。
            </p >
        </div>

        <div class="section">
            <h2>正在学习</h2>
            <div class="skills">
                <span>Python</span>
                <span>C++</span>
                <span>HTML</span>
                <span>CSS</span>
                <span>JavaScript</span>
                <span>Web开发</span>
            </div>
        </div>

        <div class="section">
            <h2>联系方式</h2>
            <p class="contact">
                邮箱：yourname@example.com<br>
                GitHub：github.com/yourname
            </p >
        </div>
    </div>
</body>
</html>
